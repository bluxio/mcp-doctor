name: Example MCP Doctor on PR

on:
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install && pnpm --filter @mcp-doctor/core build && pnpm --filter @mcp-doctor/action build
      - name: Run MCP Doctor
        uses: ./action
        with:
          stdio: npx tsx examples/fixture-server/server.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
