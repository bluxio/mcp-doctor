name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install
      - run: pnpm --filter @mcp-doctor/core build
      - run: pnpm --filter mcp-doctor build
      - run: pnpm --filter @mcp-doctor/action build
      - run: pnpm --filter mcp-doctor doctor:fixture
      - run: pnpm --filter @mcp-doctor/web build
